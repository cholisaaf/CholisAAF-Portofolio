<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MASTER REMOTE - ADMIN ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: #050505;
        color: #fff;
        font-family: "Inter", sans-serif;
      }
      .card {
        background: #111;
        border: 1px solid #222;
        border-radius: 24px;
      }
      input {
        background: #1a1a1a !important;
        border: 1px solid #333 !important;
        color: white !important;
      }
      input:focus {
        border-color: #00ff88 !important;
        outline: none;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #00ff88;
        display: inline-block;
        margin-right: 5px;
        box-shadow: 0 0 10px #00ff88;
      }
    </style>
  </head>
  <body class="p-6">
    <div class="max-w-sm mx-auto">
      <div class="flex items-center justify-between mb-8 opacity-60">
        <div class="text-[10px] font-bold tracking-widest uppercase">
          <span class="status-dot"></span> Remote Connected
        </div>
        <div class="text-[10px] font-mono">SUPABASE_DB_01</div>
      </div>

      <h1
        class="text-3xl font-black italic tracking-tighter mb-2 text-white uppercase"
      >
        Master Access
      </h1>
      <p class="text-zinc-500 text-xs mb-8">
        Daftarkan akses admin baru langsung ke database.
      </p>

      <div class="card p-6 shadow-2xl mb-8">
        <div class="space-y-5">
          <div>
            <label class="text-[10px] font-bold text-zinc-500 uppercase ml-1"
              >Admin Email</label
            >
            <input
              type="email"
              id="email"
              placeholder="contoh@mail.com"
              class="w-full p-4 mt-1 rounded-xl text-sm transition-all"
            />
          </div>
          <div>
            <label class="text-[10px] font-bold text-zinc-500 uppercase ml-1"
              >Master Password</label
            >
            <input
              type="text"
              id="pass"
              placeholder="Password123"
              class="w-full p-4 mt-1 rounded-xl text-sm transition-all"
            />
          </div>
          <button
            id="btnSave"
            onclick="registerUser()"
            class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-zinc-200 transition-all active:scale-95"
          >
            Inject Access
          </button>
        </div>
      </div>

      <h2
        class="text-[10px] font-black text-zinc-500 uppercase mb-4 tracking-widest ml-1"
      >
        Current Admins
      </h2>
      <div id="adminList" class="space-y-3"></div>
    </div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      const SB_URL = "https://vnzcwijqlkdsjokvmpgv.supabase.co";
      const SB_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZuemN3aWpxbGtkc2pva3ZtcGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNTE0MzEsImV4cCI6MjA4NzgyNzQzMX0.LS7XzMXOknHl6zhobn5oyMiG5bHqu2zucSKF0n_NGEE";
      const _supabase = createClient(SB_URL, SB_KEY);

      window.registerUser = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("pass").value;
        const btn = document.getElementById("btnSave");

        if (!email || !password) return alert("Lengkapi data!");

        btn.innerText = "INJECTING...";
        btn.disabled = true;

        const { error } = await _supabase
          .from("admin_access")
          .insert([{ email, password }]);

        if (error) {
          alert("Error: " + error.message);
        } else {
          alert("BERHASIL! Admin baru terdaftar.");
          document.getElementById("email").value = "";
          document.getElementById("pass").value = "";
          loadAdmins();
        }
        btn.innerText = "Inject Access";
        btn.disabled = false;
      };

      window.loadAdmins = async () => {
        const { data, error } = await _supabase
          .from("admin_access")
          .select("*")
          .order("created_at", { ascending: false });
        const container = document.getElementById("adminList");

        if (data) {
          container.innerHTML = data
            .map(
              (admin) => `
                    <div class="card p-4 flex justify-between items-center bg-zinc-900/50">
                        <div class="truncate mr-4">
                            <p class="text-xs font-bold text-zinc-300 truncate">${admin.email}</p>
                            <p class="text-[9px] text-zinc-600 font-mono">PWD: ${admin.password}</p>
                        </div>
                        <button onclick="deleteAdmin('${admin.id}')" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg transition-all">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                        </button>
                    </div>
                `,
            )
            .join("");
        }
      };

      window.deleteAdmin = async (id) => {
        if (confirm("Hapus akses?")) {
          await _supabase.from("admin_access").delete().eq("id", id);
          loadAdmins();
        }
      };

      loadAdmins();
    </script>
  </body>
</html>
