<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ADMIN - DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            min-height: screen;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-10px);
        }

        .icon-box {
            background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-4xl w-full">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-black italic tracking-tighter bg-gradient-to-r from-indigo-500 via-purple-500 to-cyan-500 bg-clip-text text-transparent uppercase">
                Control Center
            </h1>
            <p class="text-zinc-500 mt-4 tracking-[0.3em] text-xs font-bold uppercase">Welcome Back, Master Admin</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <a href="music.html" class="glass-card group p-8 rounded-[2.5rem] flex flex-col items-center text-center relative overflow-hidden">
                <div class="icon-box w-20 h-20 rounded-3xl flex items-center justify-center mb-6 text-3xl group-hover:scale-110 transition-transform">
                    🎵
                </div>
                <h2 class="text-2xl font-black uppercase italic text-white group-hover:text-indigo-400 transition-colors">Music Manager</h2>
                <p class="text-zinc-500 text-sm mt-2 leading-relaxed">Kelola playlist, tambah lagu MP3, atau embed Spotify ke halaman utama.</p>
                
                <div class="absolute -bottom-4 -right-4 text-8xl opacity-5 grayscale group-hover:grayscale-0 group-hover:opacity-10 transition-all">🎸</div>
            </a>

            <a href="posts.html" class="glass-card group p-8 rounded-[2.5rem] flex flex-col items-center text-center relative overflow-hidden">
                <div class="icon-box w-20 h-20 rounded-3xl flex items-center justify-center mb-6 text-3xl group-hover:scale-110 transition-transform" style="background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3);">
                    📝
                </div>
                <h2 class="text-2xl font-black uppercase italic text-white group-hover:text-pink-400 transition-colors">Post Manager</h2>
                <p class="text-zinc-500 text-sm mt-2 leading-relaxed">Atur postingan pengunjung, kelola komentar, dan hapus konten yang dilarang.</p>
                
                <div class="absolute -bottom-4 -right-4 text-8xl opacity-5 grayscale group-hover:grayscale-0 group-hover:opacity-10 transition-all">📱</div>
            </a>

        </div>

        <div class="mt-16 text-center">
            <a href="../index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-white transition-colors text-sm font-bold uppercase tracking-widest">
                <span>←</span> Keluar ke Website Utama
            </a>
        </div>
    </div>

</body>
</html>
